# LiveKit config for sgChat Relay Server
# Change the API key and secret below — these are YOUR relay's credentials.
# They must match LIVEKIT_API_KEY and LIVEKIT_API_SECRET in your .env file.

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
keys:
  your-relay-api-key: your-relay-api-secret
