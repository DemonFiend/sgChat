###############################################################################
# sgChat Relay Server — Docker Compose
#
# Setup:
#   1. On Master, run:
#      docker exec sgchat-api-1 node dist/cli/create-relay.js --name "My Relay" --region "us-east" --master-url "https://chat.example.com"
#   2. Create .env with:
#      RELAY_SETUP_TOKEN=<paste token from step 1>
#   3. Run:
#      docker compose -f docker-compose.relay.yml up -d
#
# The relay auto-detects its public IP, generates LiveKit credentials,
# and pairs with Master on first startup. Config is persisted in the
# relay-data volume for subsequent restarts.
###############################################################################

services:
  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    volumes:
      - relay-data:/data:ro
    command: ["--config", "/data/livekit.yaml"]
    restart: unless-stopped

  relay:
    image: sosiagaming/sgchat-relay:latest
    network_mode: host
    volumes:
      - relay-data:/data
    environment:
      - RELAY_SETUP_TOKEN=${RELAY_SETUP_TOKEN}
    restart: unless-stopped

volumes:
  relay-data:
